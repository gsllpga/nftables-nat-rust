name: Sync Fork (Code + Releases)

on:
  schedule:
    - cron: '0 0 * * *'   # 每天同步一次，可自行调整
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write          # 允许推送代码和创建 Release

env:
  UPSTREAM_REPO: hobin66/nodectl   # ⚠️ 替换为你的上游仓库

jobs:
  sync_all:
    runs-on: ubuntu-latest
    # 可选：只在 fork 仓库运行
    if: github.repository_owner != '原项目所有者'
    steps:
      # 1. 同步代码和标签
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉取完整历史，确保所有标签

      - name: Sync code from upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_repo: ${{ env.UPSTREAM_REPO }}
          upstream_sync_branch: main    # 上游主分支
          target_sync_branch: main       # 你的 fork 主分支
          test_mode: false

      # 2. 同步 Releases
      - name: Sync releases from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 将你的 Python 脚本粘贴在此处
          python <<'PY'
          import json
          import os
          import shutil
          import subprocess
          import tempfile

          upstream = os.environ["UPSTREAM_REPO"]
          target = os.environ["GITHUB_REPOSITORY"]
          env = os.environ.copy()

          def run(cmd, check=True, capture_output=True):
              return subprocess.run(
                  cmd,
                  env=env,
                  check=check,
                  text=True,
                  capture_output=capture_output,
              )

          def list_releases(repo):
              releases = []
              page = 1
              while True:
                  r = run(
                      ["gh", "api", f"repos/{repo}/releases?per_page=100&page={page}"]
                  )
                  batch = json.loads(r.stdout)
                  if not batch:
                      break
                  releases.extend(batch)
                  page += 1
              return releases

          for rel in list_releases(upstream):
              tag = rel["tag_name"]
              title = rel.get("name") or tag
              body = rel.get("body") or ""
              target_commitish = rel.get("target_commitish") or ""
              prerelease = rel.get("prerelease", False)

              print(f"==> syncing {tag}")

              with tempfile.NamedTemporaryFile("w", delete=False, encoding="utf-8") as nf:
                  nf.write(body)
                  notes_file = nf.name

              exists = subprocess.run(
                  ["gh", "release", "view", tag, "-R", target],
                  env=env,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
                  text=True,
              ).returncode == 0

              try:
                  if exists:
                      cmd = [
                          "gh", "release", "edit", tag,
                          "-R", target,
                          "--title", title,
                          "--notes-file", notes_file,
                      ]
                      if target_commitish:
                          cmd += ["--target", target_commitish]
                      subprocess.run(cmd, env=env, check=True)
                  else:
                      cmd = [
                          "gh", "release", "create", tag,
                          "-R", target,
                          "--title", title,
                          "--notes-file", notes_file,
                      ]
                      if target_commitish:
                          cmd += ["--target", target_commitish]
                      if prerelease:
                          cmd.append("--prerelease")
                      subprocess.run(cmd, env=env, check=True)

                  tmpdir = tempfile.mkdtemp(prefix="release-sync-")
                  try:
                      dl = subprocess.run(
                          ["gh", "release", "download", tag, "-R", upstream, "-D", tmpdir, "--clobber"],
                          env=env,
                          text=True,
                          capture_output=True,
                      )
                      msg = (dl.stdout or "") + "\n" + (dl.stderr or "")
                      if dl.returncode != 0 and "no assets" not in msg.lower():
                          raise subprocess.CalledProcessError(dl.returncode, dl.args, dl.stdout, dl.stderr)

                      files = [os.path.join(tmpdir, name) for name in os.listdir(tmpdir)]
                      if files:
                          subprocess.run(
                              ["gh", "release", "upload", tag, *files, "-R", target, "--clobber"],
                              env=env,
                              check=True,
                          )
                  finally:
                      shutil.rmtree(tmpdir, ignore_errors=True)

              finally:
                  try:
                      os.unlink(notes_file)
                  except FileNotFoundError:
                      pass
          PY
